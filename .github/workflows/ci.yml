name: eval-ci

# 每次 push / PR 跑「確定性」測試（stats / 引用護欄 / BM25·RRF / golden schema / 多輪計分邏輯）。
# 不含本地 4B judge 與 Ollama（免費 runner 跑不動）——那些標 @local，本地或 self-hosted 跑。
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run deterministic test suite (no Ollama / no index)
        run: pytest -m "not local" -v
