name: eval-ci

# push / PR：確定性測試 + 檢索品質 gate（免 LLM、免金鑰，會擋 PR）。
# nightly / 手動：生成品質 gate（雲端 LLM，用 GitHub secret；較慢/耗免費額度故不每次跑）。
on:
  push:
  pull_request:
  schedule:
    - cron: "0 18 * * *"        # 每日 nightly 生成 gate（UTC）
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt pytest
      - name: Deterministic tests (no Ollama / no index)
        run: pytest -m "not local" -v

  retrieval-gate:
    # 檢索品質 SLO gate：不需 LLM/金鑰，每次 push/PR 都擋（低於 slo.py 門檻 → exit 1 紅燈）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true              # 取 LFS 的語料 PDF（ingest 需要）
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build index (bge-small-zh -> FAISS)
        working-directory: rag
        run: python ingest.py
      - name: Retrieval quality gate (SLO; exit 1 if regress)
        working-directory: rag
        run: python eval_gate.py

  generation-gate:
    # 生成品質 SLO gate：需雲端金鑰 + 較慢 → 只在 nightly / 手動觸發跑（避免每 push 燒免費額度）
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build index
        working-directory: rag
        run: python ingest.py
      - name: Generation quality gate (cloud LLM, throttled)
        working-directory: rag
        env:
          CITERAG_LLM_BACKEND: cloud
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python eval_gate.py --gen
